<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comanda Digital Pro - Cliente</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --bg-dark: #0f0f0f; --card-dark: #1e1e1e; --accent-gold: #f39c12; }
        body { background-color: var(--bg-dark); font-family: 'Poppins', sans-serif; color: #ffffff; }
        .header { background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1514933651103-005eec06c04b?q=80&w=1974&auto=format&fit=crop'); background-size: cover; padding: 2.5rem 0; text-align: center; border-bottom: 2px solid var(--accent-gold); }
        .menu-card { background: var(--card-dark); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 1.5rem; transition: 0.3s; margin-bottom: 1rem; }
        .price-label { font-size: 1.2rem; font-weight: 700; color: var(--accent-gold); display: block; text-align: center; margin: 10px 0; }
        .quantity-btn { background: var(--accent-gold); border: none; width: 32px; height: 32px; border-radius: 8px; font-weight: bold; }
        .quantity-input { width: 40px; text-align: center; background: transparent; border: none; color: #fff; font-weight: bold; }
        .total-card { background: var(--card-dark); border: 1px solid var(--accent-gold); border-radius: 16px; padding: 1.5rem; position: sticky; top: 20px; }
        .btn-order { background: var(--accent-gold); color: #000; font-weight: 700; border-radius: 10px; padding: 12px; width: 100%; border: none; }
    </style>
</head>
<body>

<header class="header">
    <div class="container">
        <h1 class="fw-bold text-warning"><i class="bi bi-receipt-cutoff"></i> Comanda Digital</h1>
        <p class="text-white-50">Premium Service</p>
    </div>
</header>

<main class="container my-4">
    <div class="row g-3 justify-content-center mb-4">
        <div class="col-md-4">
            <input type="text" class="form-control bg-dark text-white border-secondary" id="clientName" placeholder="Seu Nome">
        </div>
        <div class="col-md-2">
            <input type="number" class="form-control bg-dark text-white border-secondary" id="tableNumber" placeholder="Mesa">
        </div>
        <div class="col-md-3">
            <div id="statusBadge" class="badge bg-success w-100 p-3"><i class="bi bi-unlock-fill"></i> COMANDA ABERTA</div>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-8">
            <div class="row">
                <div class="col-md-6">
                    <div class="menu-card" data-name="Heineken 600ml" data-price="45.00">
                        <h4 class="text-center">Heineken 600ml</h4>
                        <span class="price-label">R$ 45,00</span>
                        <div class="d-flex justify-content-center align-items-center">
                            <button class="quantity-btn" onclick="mudarQtd(this, -1)">-</button>
                            <input type="number" class="quantity-input" value="0" readonly>
                            <button class="quantity-btn" onclick="mudarQtd(this, 1)">+</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="menu-card" data-name="Porção Frango" data-price="35.00">
                        <h4 class="text-center">Porção Frango</h4>
                        <span class="price-label">R$ 35,00</span>
                        <div class="d-flex justify-content-center align-items-center">
                            <button class="quantity-btn" onclick="mudarQtd(this, -1)">-</button>
                            <input type="number" class="quantity-input" value="0" readonly>
                            <button class="quantity-btn" onclick="mudarQtd(this, 1)">+</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div id="comandaParaPdf" class="total-card">
                <h4 class="text-center mb-4">RESUMO</h4>
                <div class="d-flex justify-content-between mb-2"><span>Subtotal:</span> <span id="subtotal">R$ 0,00</span></div>
                <div class="d-flex justify-content-between mb-3 border-bottom pb-2"><span>Taxa (10%):</span> <span id="tax">R$ 0,00</span></div>
                <h3 id="total" class="text-warning fw-bold text-center mb-4">R$ 0,00</h3>
                <button class="btn-order mb-2" onclick="abrirPagamento()">ENVIAR PEDIDO</button>
                <button class="btn btn-outline-info w-100 btn-sm mb-2" onclick="gerarPDF()">Baixar PDF</button>
                <button class="btn btn-outline-secondary w-100 btn-sm" onclick="location.reload()">Limpar</button>
            </div>
        </div>
    </div>
</main>

<div class="modal fade" id="payModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-white border-warning">
            <div class="modal-body text-center p-4">
                <h4>Pagamento</h4>
                <div class="d-grid gap-2 mt-4">
                    <button class="btn btn-warning fw-bold" onclick="finalizar('PIX')">PIX</button>
                    <button class="btn btn-outline-light" onclick="finalizar('Cartão')">CARTÃO</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const modal = new bootstrap.Modal(document.getElementById('payModal'));
    function mudarQtd(btn, delta) {
        const input = btn.parentElement.querySelector('.quantity-input');
        let v = parseInt(input.value) + delta;
        input.value = v < 0 ? 0 : v;
        atualizar();
    }
    function atualizar() {
        let sub = 0;
        document.querySelectorAll('.menu-card').forEach(c => {
            sub += parseFloat(c.dataset.price) * parseInt(c.querySelector('.quantity-input').value);
        });
        document.getElementById('subtotal').innerText = `R$ ${sub.toFixed(2)}`;
        document.getElementById('tax').innerText = `R$ ${(sub * 0.1).toFixed(2)}`;
        document.getElementById('total').innerText = `R$ ${(sub * 1.1).toFixed(2)}`;
    }
    function abrirPagamento() {
        if (parseFloat(document.getElementById('total').innerText.replace('R$ ', '')) <= 0) return alert("Adicione itens!");
        modal.show();
    }
    function finalizar(metodo) {
        const pedido = {
            id: Date.now(),
            cliente: document.getElementById('clientName').value || "Cliente",
            mesa: document.getElementById('tableNumber').value || "0",
            total: document.getElementById('total').innerText,
            metodo: metodo,
            hora: new Date().toLocaleTimeString(),
            itens: []
        };
        document.querySelectorAll('.menu-card').forEach(c => {
            const q = parseInt(c.querySelector('.quantity-input').value);
            if (q > 0) pedido.itens.push({ nome: c.dataset.name, qtd: q });
        });
        let db = JSON.parse(localStorage.getItem('pedidosBalcao') || '[]');
        db.push(pedido);
        localStorage.setItem('pedidosBalcao', JSON.stringify(db));
        modal.hide();
        document.getElementById('statusBadge').className = "badge bg-danger w-100 p-3";
        document.getElementById('statusBadge').innerHTML = '<i class="bi bi-clock"></i> ENVIADO';
        alert("Pedido enviado!");
    }
    function gerarPDF() {
        const elemento = document.getElementById('comandaParaPdf');
        html2pdf().from(elemento).save();
    }
</script>
</body>
</html>

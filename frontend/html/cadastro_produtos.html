<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Pro - Comanda Digital Luna</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/cadastro_produtos.css">

</head>
<body>

<div class="container" style="max-width: 900px;">
    
    <div class="premium-card">
        <h2 class="section-title"><i class="bi bi-pencil-square"></i> Novo Cadastro</h2>
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label small text-uppercase">Descrição do Item</label>
                <input type="text" id="desc" class="form-control" placeholder="Ex: Filé ao Molho Madeira">
            </div>
            <div class="col-md-3">
                <label class="form-label small text-uppercase">Valor (R$)</label>
                <input type="number" id="valor" class="form-control" placeholder="0.00">
            </div>
            <div class="col-md-3">
                <label class="form-label small text-uppercase">Data</label>
                <input type="date" id="data_reg" class="form-control">
            </div>
            <div class="col-12 mt-4">
                <button onclick="adicionarItem()" class="btn btn-gold">Cadastrar na Base</button>
            </div>
        </div>
    </div>

    <div class="premium-card">
        <h2 class="section-title"><i class="bi bi-layers"></i> Itens do Período</h2>
        <div class="table-responsive">
            <table class="table custom-table">
                <tbody id="listaItens">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="premium-card">
        <h2 class="section-title"><i class="bi bi-printer"></i> Centro de Impressão</h2>
        <div class="row g-3">
            <div class="col-6 col-md-3"><button onclick="gerarRelatorio('Diário')" class="btn btn-report w-100">Diário</button></div>
            <div class="col-6 col-md-3"><button onclick="gerarRelatorio('Semanal')" class="btn btn-report w-100">Semanal</button></div>
            <div class="col-6 col-md-3"><button onclick="gerarRelatorio('Quinzenal')" class="btn btn-report w-100">Quinzenal</button></div>
            <div class="col-6 col-md-3"><button onclick="gerarRelatorio('Mensal')" class="btn btn-report w-100">Mensal</button></div>
        </div>
    </div>
</div>

<div id="printSection" style="display: none; padding: 20px; font-family: sans-serif;">
    <h2 id="printTitle" style="text-align: center;"></h2>
    <hr>
    <div id="printBody"></div>
    <hr>
    <h3 id="printTotal" style="text-align: right;"></h3>
</div>

<script src="../js/cadastro_produtos.js"></script>

</body>
</html>

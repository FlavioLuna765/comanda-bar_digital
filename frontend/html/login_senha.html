<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Comanda Digital Luna</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/login_senha.css">
</head>
<body>

    <div class="login-card">
        <i class="bi bi-person-lock brand-icon-mini"></i>
        <h1 class="login-title">Área do Cliente</h1>
        <p class="login-subtitle">Entre com suas credenciais para continuar</p>
        
        <form id="loginForm">
            <div class="mb-4">
                <label class="form-label">E-mail ou Usuário</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="text" class="form-control" id="userInput" placeholder="seu@email.com" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label">Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-key"></i></span>
                    <input type="password" class="form-control" id="passInput" placeholder="••••••••" required>
                </div>
            </div>
            
            <button type="submit" id="btnLogin" class="btn btn-login">
                Entrar no Sistema
            </button>
        </form>
        
        <a href="#" class="forgot-password">Esqueceu sua senha?</a>

        <div class="text-center mt-5">
            <small style="color: rgba(255,255,255,0.2); font-size: 0.7rem; text-transform: uppercase;">
                Acesso Restrito - Luna Comanda
            </small>
        </div>
    </div>
    <script src="../js/login_senha.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Comanda Digital Luna</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --card-dark: #1e1e1e;
            --accent-gold: #f39c12;
            --text-gray: #a0a0a0;
            --input-bg: #2a2a2a;
        }

        body {
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1514933651103-005eec06c04b?q=80&w=1974&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
        }

        .login-card {
            background: var(--card-dark);
            border: 1px solid var(--accent-gold);
            padding: 3rem 2.5rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 90%;
            position: relative;
            overflow: hidden;
        }

        .login-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-align: center;
            color: #fff;
            text-transform: uppercase;
        }

        .login-subtitle {
            color: var(--text-gray);
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        /* ESTILO DOS INPUTS */
        .form-label {
            color: var(--accent-gold);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-left: 5px;
        }

        .input-group-text {
            background-color: var(--input-bg);
            border: 1px solid var(--glass-border);
            color: var(--accent-gold);
            border-right: none;
            border-radius: 12px 0 0 12px;
        }

        .form-control {
            background-color: var(--input-bg);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background-color: #252525;
            border-color: var(--accent-gold);
            color: #fff;
            box-shadow: none;
        }

        /* BOTÃO DE LOGIN */
        .btn-login {
            background: var(--accent-gold);
            color: #000;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            border: 2px solid var(--accent-gold);
            transition: all 0.3s ease;
            text-transform: uppercase;
            width: 100%;
            margin-top: 1rem;
        }

        .btn-login:hover {
            background: transparent;
            color: var(--accent-gold);
            box-shadow: 0 10px 20px rgba(243, 156, 18, 0.2);
        }

        .forgot-password {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .forgot-password:hover {
            color: var(--accent-gold);
        }

        .brand-icon-mini {
            font-size: 2.5rem;
            color: var(--accent-gold);
            text-align: center;
            display: block;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <i class="bi bi-person-lock brand-icon-mini"></i>
        <h1 class="login-title">Área do Cliente</h1>
        <p class="login-subtitle">Entre com suas credenciais para continuar</p>
        
        <form id="loginForm">
            <div class="mb-4">
                <label class="form-label">E-mail ou Usuário</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="text" class="form-control" id="userInput" placeholder="seu@email.com" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label">Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-key"></i></span>
                    <input type="password" class="form-control" id="passInput" placeholder="••••••••" required>
                </div>
            </div>
            
            <button type="submit" id="btnLogin" class="btn btn-login">
                Entrar no Sistema
            </button>
        </form>
        
        <a href="#" class="forgot-password">Esqueceu sua senha?</a>

        <div class="text-center mt-5">
            <small style="color: rgba(255,255,255,0.2); font-size: 0.7rem; text-transform: uppercase;">
                Acesso Restrito - Luna Comanda
            </small>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const btnLogin = document.getElementById('btnLogin');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Efeito visual de carregamento
            btnLogin.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Autenticando...';
            btnLogin.disabled = true;

            setTimeout(() => {
                // Simulação de lógica de login
                alert('Login realizado com sucesso! Redirecionando...');
                window.location.href = 'index.html'; // Volta para a sua home ou dashboard
            }, 1500);
        });
    </script>
</body>
</html>

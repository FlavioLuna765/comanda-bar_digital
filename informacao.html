<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Pro - Comanda Digital Luna</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --card-dark: #1e1e1e;
            --accent-gold: #f39c12;
            --text-gray: #a0a0a0;
            --glass-border: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(255, 255, 255, 0.08);
        }

        body {
            background: linear-gradient(rgba(0,0,0,0.92), rgba(0,0,0,0.92)), 
                        url('https://images.unsplash.com/photo-1514933651103-005eec06c04b?q=80&w=1974&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
        }

        .premium-card {
            background: var(--card-dark);
            border: 1px solid var(--accent-gold);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .form-control, .form-select {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 0.8rem;
            border-radius: 12px;
        }

        .form-control:focus, .form-select:focus {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent-gold);
            color: white;
            box-shadow: none;
        }

        .btn-gold {
            background: var(--accent-gold);
            color: #000;
            font-weight: 700;
            border-radius: 12px;
            border: 2px solid var(--accent-gold);
            padding: 0.8rem;
            transition: 0.3s;
            width: 100%;
        }

        .btn-gold:hover { background: transparent; color: var(--accent-gold); }

        .btn-report {
            background: transparent;
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            border-radius: 12px;
            padding: 1rem;
            transition: 0.3s;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .btn-report:hover { background: var(--accent-gold); color: #000; }

        /* Tabela */
        .custom-table { color: white; margin-top: 1rem; }
        .custom-table tr { background: rgba(255,255,255,0.03); border-bottom: 8px solid var(--card-dark); }
        .custom-table td { padding: 15px; vertical-align: middle; border: none; }
        .btn-delete { color: #e74c3c; cursor: pointer; font-size: 1.2rem; background: none; border: none; }
        .btn-delete:hover { color: #ff5e4d; }

        @media print {
            body * { visibility: hidden; }
            #printSection, #printSection * { visibility: visible; }
            #printSection { position: absolute; left: 0; top: 0; width: 100%; color: black !important; background: white !important; }
        }
    </style>
</head>
<body>

<div class="container" style="max-width: 900px;">
    
    <div class="premium-card">
        <h2 class="section-title"><i class="bi bi-pencil-square"></i> Novo Cadastro</h2>
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label small text-uppercase">Descrição do Item</label>
                <input type="text" id="desc" class="form-control" placeholder="Ex: Filé ao Molho Madeira">
            </div>
            <div class="col-md-3">
                <label class="form-label small text-uppercase">Valor (R$)</label>
                <input type="number" id="valor" class="form-control" placeholder="0.00">
            </div>
            <div class="col-md-3">
                <label class="form-label small text-uppercase">Data</label>
                <input type="date" id="data_reg" class="form-control">
            </div>
            <div class="col-12 mt-4">
                <button onclick="adicionarItem()" class="btn btn-gold">Cadastrar na Base</button>
            </div>
        </div>
    </div>

    <div class="premium-card">
        <h2 class="section-title"><i class="bi bi-layers"></i> Itens do Período</h2>
        <div class="table-responsive">
            <table class="table custom-table">
                <tbody id="listaItens">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="premium-card">
        <h2 class="section-title"><i class="bi bi-printer"></i> Centro de Impressão</h2>
        <div class="row g-3">
            <div class="col-6 col-md-3"><button onclick="gerarRelatorio('Diário')" class="btn btn-report w-100">Diário</button></div>
            <div class="col-6 col-md-3"><button onclick="gerarRelatorio('Semanal')" class="btn btn-report w-100">Semanal</button></div>
            <div class="col-6 col-md-3"><button onclick="gerarRelatorio('Quinzenal')" class="btn btn-report w-100">Quinzenal</button></div>
            <div class="col-6 col-md-3"><button onclick="gerarRelatorio('Mensal')" class="btn btn-report w-100">Mensal</button></div>
        </div>
    </div>
</div>

<div id="printSection" style="display: none; padding: 20px; font-family: sans-serif;">
    <h2 id="printTitle" style="text-align: center;"></h2>
    <hr>
    <div id="printBody"></div>
    <hr>
    <h3 id="printTotal" style="text-align: right;"></h3>
</div>

<script>
    let itens = [];

    // Define data de hoje no input por padrão
    document.getElementById('data_reg').valueAsDate = new Date();

    function adicionarItem() {
        const desc = document.getElementById('desc').value;
        const valor = parseFloat(document.getElementById('valor').value);
        const data = document.getElementById('data_reg').value;

        if(!desc || !valor) return alert("Preencha os campos corretamente!");

        const novoItem = { id: Date.now(), desc, valor, data };
        itens.push(novoItem);
        atualizarTabela();
        
        // Limpa campos
        document.getElementById('desc').value = '';
        document.getElementById('valor').value = '';
    }

    function excluirItem(id) {
        itens = itens.filter(i => i.id !== id);
        atualizarTabela();
    }

    function atualizarTabela() {
        const tbody = document.getElementById('listaItens');
        tbody.innerHTML = '';
        
        itens.forEach(item => {
            tbody.innerHTML += `
                <tr>
                    <td><span class="text-secondary small">${item.data}</span><br><strong>${item.desc}</strong></td>
                    <td class="text-end var(--accent-gold)">R$ ${item.valor.toFixed(2)}</td>
                    <td class="text-end">
                        <button onclick="excluirItem(${item.id})" class="btn-delete"><i class="bi bi-x-circle"></i></button>
                    </td>
                </tr>
            `;
        });
    }

    function gerarRelatorio(tipo) {
        if(itens.length === 0) return alert("Não há dados para o relatório!");

        const printTitle = document.getElementById('printTitle');
        const printBody = document.getElementById('printBody');
        const printTotal = document.getElementById('printTotal');
        
        printTitle.innerText = "Relatório " + tipo + " - Comanda Luna";
        
        let html = '<table style="width:100%; border-collapse: collapse;">';
        let total = 0;
        
        itens.forEach(i => {
            html += `<tr><td style="padding:8px; border-bottom:1px solid #ddd;">${i.data} - ${i.desc}</td><td style="text-align:right">R$ ${i.valor.toFixed(2)}</td></tr>`;
            total += i.valor;
        });
        
        html += '</table>';
        printBody.innerHTML = html;
        printTotal.innerText = "Total Geral: R$ " + total.toFixed(2);

        window.print();
    }
</script>

</body>
</html>

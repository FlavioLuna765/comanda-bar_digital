<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel do Balcão - Monitor de Pedidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #121212; color: white; font-family: 'Poppins', sans-serif; }
        .order-card { background: #1e1e1e; border-left: 5px solid #f39c12; margin-bottom: 20px; transition: 0.3s; }
        .order-card:hover { transform: scale(1.01); }
        .item-list { color: #a0a0a0; font-size: 0.9rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark border-bottom border-warning">
    <div class="container">
        <span class="navbar-brand fw-bold text-warning"><i class="bi bi-speedometer2"></i> PAINEL DO BALCÃO</span>
        <button class="btn btn-outline-danger btn-sm" onclick="limparTudo()">Limpar Histórico</button>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">Pedidos Recebidos</h2>
    <div id="listaPedidos" class="row">
        </div>
</div>

<script>
    function carregarPedidos() {
        const lista = document.getElementById('listaPedidos');
        const pedidos = JSON.parse(localStorage.getItem('pedidosBalcao') || '[]');
        
        if (pedidos.length === 0) {
            lista.innerHTML = '<div class="col-12 text-center opacity-50"><h4>Nenhum pedido no momento...</h4></div>';
            return;
        }

        lista.innerHTML = pedidos.reverse().map(p => `
            <div class="col-md-6 col-lg-4">
                <div class="card order-card shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between border-bottom border-secondary pb-2 mb-2">
                            <h5 class="card-title mb-0 text-warning">Mesa ${p.mesa}</h5>
                            <span class="badge bg-dark">${p.hora}</span>
                        </div>
                        <h6 class="text-white">${p.cliente}</h6>
                        <div class="item-list mb-3">
                            ${p.itens.map(i => `<div>• ${i.qtd}x ${i.nome}</div>`).join('')}
                        </div>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="fw-bold">${p.total}</span>
                            <span class="small text-info">${p.metodo}</span>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function limparTudo() {
        if(confirm("Deseja apagar todos os pedidos do painel?")) {
            localStorage.removeItem('pedidosBalcao');
            carregarPedidos();
        }
    }

    // Atualiza a tela automaticamente quando o localStorage mudar (outra aba salvar pedido)
    window.addEventListener('storage', carregarPedidos);
    
    // Carrega ao iniciar
    carregarPedidos();
    
    // Checa por novos pedidos a cada 2 segundos também
    setInterval(carregarPedidos, 2000);
</script>
</body>
</html>

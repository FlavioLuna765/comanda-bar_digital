<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comanda Digital Pro - Cliente</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --bg-dark: #0f0f0f; --card-dark: #1e1e1e; --accent-gold: #f39c12; --text-gray: #a0a0a0; --glass-border: rgba(255, 255, 255, 0.05); }
        body { background-color: var(--bg-dark); font-family: 'Poppins', sans-serif; color: #ffffff; }
        .header { background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1514933651103-005eec06c04b?q=80&w=1974&auto=format&fit=crop'); background-size: cover; padding: 3rem 0; text-align: center; border-bottom: 2px solid var(--accent-gold); }
        .header h1 { color: var(--accent-gold); font-weight: 700; }
        .section-title { font-size: 1.2rem; font-weight: 600; margin: 2rem 0; text-align: center; text-transform: uppercase; color: var(--accent-gold); }
        .menu-card { background: var(--card-dark); border: 1px solid var(--glass-border); border-radius: 16px; padding: 1.5rem; transition: 0.3s; margin-bottom: 1rem; }
        .menu-card:hover { border-color: var(--accent-gold); transform: translateY(-5px); }
        .price-label { font-size: 1.2rem; font-weight: 700; color: var(--accent-gold); display: block; text-align: center; }
        .quantity-btn { background: var(--accent-gold); border: none; width: 30px; height: 30px; border-radius: 5px; font-weight: bold; }
        .quantity-input { width: 40px; text-align: center; background: transparent; border: none; color: #fff; font-weight: bold; }
        .total-card { background: var(--card-dark); border: 1px solid var(--accent-gold); border-radius: 16px; padding: 1.5rem; position: sticky; top: 20px; }
        .btn-order { background: var(--accent-gold); color: #000; font-weight: 700; border-radius: 10px; padding: 10px; width: 100%; border: none; }
        .status-badge { transition: 0.5s; font-weight: 600; }
    </style>
</head>
<body>

<header class="header">
    <div class="container">
        <h1><i class="bi bi-receipt-cutoff"></i> Comanda Digital</h1>
        <p class="text-white-50">Mesa e Pedidos em Tempo Real</p>
    </div>
</header>

<main class="container my-4">
    <div class="row g-3 justify-content-center mb-4">
        <div class="col-md-4">
            <input type="text" class="form-control bg-dark text-white border-secondary" id="clientName" placeholder="Nome do Cliente">
        </div>
        <div class="col-md-2">
            <input type="number" class="form-control bg-dark text-white border-secondary" id="tableNumber" placeholder="Mesa">
        </div>
        <div class="col-md-3">
            <div id="statusBadge" class="badge bg-success w-100 p-3 status-badge">
                <i class="bi bi-unlock-fill"></i> COMANDA ABERTA
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-8">
            <div class="row">
                <div class="col-md-6">
                    <div class="menu-card" data-name="Heineken 600ml" data-price="45.00">
                        <h4 class="text-center">Heineken</h4>
                        <p class="text-center text-secondary small">Balde com 6 unidades</p>
                        <span class="price-label">R$ 45,00</span>
                        <div class="d-flex justify-content-center align-items-center">
                            <button class="quantity-btn minus-btn">-</button>
                            <input type="number" class="quantity-input" value="0" readonly>
                            <button class="quantity-btn plus-btn">+</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="menu-card" data-name="Porção de Frango" data-price="35.00">
                        <h4 class="text-center">Porção Frango</h4>
                        <p class="text-center text-secondary small">Com fritas crocantes</p>
                        <span class="price-label">R$ 35,00</span>
                        <div class="d-flex justify-content-center align-items-center">
                            <button class="quantity-btn minus-btn">-</button>
                            <input type="number" class="quantity-input" value="0" readonly>
                            <button class="quantity-btn plus-btn">+</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="total-card text-center">
                <h4 class="mb-3">RESUMO</h4>
                <div class="d-flex justify-content-between mb-2"><span>Subtotal:</span> <span id="subtotal">R$ 0,00</span></div>
                <div class="d-flex justify-content-between mb-3"><span>Taxa (10%):</span> <span id="serviceTax">R$ 0,00</span></div>
                <h3 id="totalAmount" class="text-warning fw-bold mb-4">R$ 0,00</h3>
                <button id="paymentBtn" class="btn-order mb-2">FINALIZAR PEDIDO</button>
                <button id="resetBtn" class="btn btn-outline-secondary w-100 btn-sm">Limpar</button>
            </div>
        </div>
    </div>
</main>

<div class="modal fade" id="paymentModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-white border-warning">
            <div class="modal-body text-center p-4">
                <h5>Escolha a forma de pagamento</h5>
                <div class="d-grid gap-2 mt-4">
                    <button class="btn btn-outline-warning" onclick="enviarParaBalcao('PIX')">PIX</button>
                    <button class="btn btn-outline-light" onclick="enviarParaBalcao('Cartão')">Cartão</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const formatBRL = (v) => v.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' });
    const paymentModal = new bootstrap.Modal(document.getElementById('paymentModal'));

    function atualizarTotais() {
        let subtotal = 0;
        document.querySelectorAll('.menu-card').forEach(card => {
            const preco = parseFloat(card.getAttribute('data-price'));
            const qtd = parseInt(card.querySelector('.quantity-input').value);
            subtotal += preco * qtd;
        });
        const taxa = subtotal * 0.10;
        document.getElementById('subtotal').innerText = formatBRL(subtotal);
        document.getElementById('serviceTax').innerText = formatBRL(taxa);
        document.getElementById('totalAmount').innerText = formatBRL(subtotal + taxa);
    }

    document.querySelectorAll('.plus-btn').forEach(btn => {
        btn.onclick = () => { 
            const input = btn.parentElement.querySelector('.quantity-input');
            input.value = parseInt(input.value) + 1;
            atualizarTotais();
        };
    });

    document.querySelectorAll('.minus-btn').forEach(btn => {
        btn.onclick = () => {
            const input = btn.parentElement.querySelector('.quantity-input');
            if (input.value > 0) { input.value = parseInt(input.value) - 1; atualizarTotais(); }
        };
    });

    document.getElementById('paymentBtn').onclick = () => {
        if (document.getElementById('totalAmount').innerText === "R$ 0,00") return alert("Comanda vazia!");
        paymentModal.show();
    };

    function enviarParaBalcao(metodo) {
        const pedido = {
            id: Date.now(),
            cliente: document.getElementById('clientName').value || "Cliente s/ Nome",
            mesa: document.getElementById('tableNumber').value || "0",
            total: document.getElementById('totalAmount').innerText,
            metodo: metodo,
            hora: new Date().toLocaleTimeString(),
            itens: []
        };

        document.querySelectorAll('.menu-card').forEach(card => {
            const qtd = parseInt(card.querySelector('.quantity-input').value);
            if (qtd > 0) pedido.itens.push({ nome: card.getAttribute('data-name'), qtd: qtd });
        });

        // SALVA NO LOCALSTORAGE PARA O OUTRO ARQUIVO LER
        let historico = JSON.parse(localStorage.getItem('pedidosBalcao') || '[]');
        historico.push(pedido);
        localStorage.setItem('pedidosBalcao', JSON.stringify(historico));

        paymentModal.hide();
        
        // Altera Status do Botão
        const badge = document.getElementById('statusBadge');
        badge.className = "badge bg-danger w-100 p-3 status-badge";
        badge.innerHTML = '<i class="bi bi-clock-history"></i> PEDIDO NO BALCÃO';

        alert("Pedido enviado com sucesso!");
        
        // Reset após 5 segundos para simular nova comanda
        setTimeout(() => {
            document.querySelectorAll('.quantity-input').forEach(i => i.value = 0);
            atualizarTotais();
            badge.className = "badge bg-success w-100 p-3 status-badge";
            badge.innerHTML = '<i class="bi bi-unlock-fill"></i> COMANDA ABERTA';
        }, 5000);
    }
</script>
</body>
</html>

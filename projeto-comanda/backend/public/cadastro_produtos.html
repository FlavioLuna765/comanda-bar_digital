<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gestão | Produtos Luna</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f0f0f; color: #fff; padding: 40px; }
        .card-luna { background: #1a1a1a; border: 1px solid #333; padding: 25px; border-radius: 15px; margin-bottom: 20px; }
        .table { color: #fff; }
        .btn-delete { color: #ff4d4d; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between mb-4">
            <h2>Gestão de <span style="color: #f39c12;">Produtos</span></h2>
            <button onclick="logout()" class="btn btn-outline-danger btn-sm">Sair</button>
        </div>

        <div class="card-luna">
            <div class="row g-3">
                <div class="col-md-6"><input type="text" id="nome" class="form-control" placeholder="Nome do Produto"></div>
                <div class="col-md-4"><input type="number" id="preco" class="form-control" placeholder="Preço (0.00)"></div>
                <div class="col-md-2"><button onclick="salvar()" class="btn btn-warning w-100 fw-bold">SALVAR</button></div>
            </div>
        </div>

        <div class="card-luna">
            <table class="table">
                <thead><tr><th>Nome</th><th>Preço</th><th class="text-end">Ação</th></tr></thead>
                <tbody id="lista"></tbody>
            </table>
        </div>

        <button onclick="gerarPDF()" class="btn btn-outline-info w-100">GERAR RELATÓRIO PDF</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        const API = "http://localhost:3001/api";
        const token = localStorage.getItem('tokenLuna');

        if (!token) window.location.href = 'login.html';

        async function listar() {
            const res = await fetch(`${API}/products`);
            const dados = await res.json();
            document.getElementById('lista').innerHTML = dados.map(p => `
                <tr>
                    <td>${p.name}</td>
                    <td>R$ ${p.price.toFixed(2)}</td>
                    <td class="text-end"><span class="btn-delete" onclick="deletar('${p._id}')">Excluir</span></td>
                </tr>
            `).join('');
        }

        async function salvar() {
            const name = document.getElementById('nome').value;
            const price = document.getElementById('preco').value;
            await fetch(`${API}/products`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ name, price: parseFloat(price) })
            });
            listar();
        }

        async function deletar(id) {
            await fetch(`${API}/products/${id}`, { 
                method: 'DELETE', 
                headers: { 'Authorization': `Bearer ${token}` } 
            });
            listar();
        }

        async function gerarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const res = await fetch(`${API}/reports/all`, { headers: { 'Authorization': `Bearer ${token}` } });
            const produtos = await res.json();
            
            doc.text("RELATÓRIO DE ESTOQUE - LUNA", 10, 10);
            produtos.forEach((p, i) => doc.text(`${p.name} - R$ ${p.price.toFixed(2)}`, 10, 20 + (i * 10)));
            doc.save("estoque.pdf");
        }

        function logout() { localStorage.removeItem('tokenLuna'); window.location.href = 'login.html'; }
        listar();
    </script>
</body>
</html>

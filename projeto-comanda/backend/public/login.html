<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login | Admin Luna</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f0f0f; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: #1a1a1a; padding: 40px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid #333; }
        .form-control { background: #222; border: 1px solid #444; color: #fff; }
        .form-control:focus { background: #222; border-color: #f39c12; color: #fff; box-shadow: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="text-center mb-4" style="color: #f39c12;">ADMIN LOGIN</h3>
        <form id="loginForm">
            <input type="text" id="user" class="form-control mb-3" placeholder="Usuário (admin)" required>
            <input type="password" id="pass" class="form-control mb-3" placeholder="Senha (123)" required>
            <button type="submit" class="btn btn-warning w-100 fw-bold">ENTRAR</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('http://localhost:3001/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    username: document.getElementById('user').value, 
                    password: document.getElementById('pass').value 
                })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('tokenLuna', data.token);
                window.location.href = 'cadastro_produtos.html';
            } else {
                alert(data.msg || "Erro no login");
            }
        };
    </script>
</body>
</html>

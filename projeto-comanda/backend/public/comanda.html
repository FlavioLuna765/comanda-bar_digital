<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cardápio Digital | Luna</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f0f0f; color: #fff; padding: 20px; font-family: sans-serif; }
        .item-card { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-add { background: #f39c12; color: #000; border: none; border-radius: 8px; font-weight: bold; }
        .cart-float { position: fixed; bottom: 20px; right: 20px; background: #2ecc71; color: #fff; padding: 15px 25px; border-radius: 50px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); border: none; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 600px;">
        <h2 class="mb-4">Olá! Escolha seu <span style="color: #f39c12;">Pedido</span></h2>
        <div id="listaProdutos"></div>
    </div>

    <button class="cart-float" id="btnFinalizar" style="display: none;" onclick="enviarPedido()">
        ENVIAR PEDIDO (R$ <span id="totalCarrinho">0.00</span>)
    </button>

    <script>
        let carrinho = [];
        let total = 0;

        async function carregarProdutos() {
            const res = await fetch('http://localhost:3001/api/products');
            const produtos = await res.json();
            document.getElementById('listaProdutos').innerHTML = produtos.map(p => `
                <div class="item-card">
                    <div>
                        <h6 class="mb-0">${p.name}</h6>
                        <small class="text-secondary">R$ ${p.price.toFixed(2)}</small>
                    </div>
                    <button class="btn btn-add btn-sm" onclick="addCarrinho('${p.name}', ${p.price})">ADICIONAR</button>
                </div>
            `).join('');
        }

        function addCarrinho(nome, preco) {
            carrinho.push(nome);
            total += preco;
            document.getElementById('totalCarrinho').innerText = total.toFixed(2);
            document.getElementById('btnFinalizar').style.display = 'block';
        }

        async function enviarPedido() {
            const mesa = prompt("Qual o número da sua mesa?");
            if (!mesa) return;

            const res = await fetch('http://localhost:3000/api/orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items: carrinho, total: total, table: mesa })
            });

            if (res.ok) {
                alert("Pedido enviado para a cozinha!");
                carrinho = []; total = 0;
                document.getElementById('btnFinalizar').style.display = 'none';
            }
        }
        carregarProdutos();
    </script>
</body>
</html>
